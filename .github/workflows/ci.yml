name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: tests
        run: cargo test --workspace

  xsd-validate:
    # Validates the valid XML fixtures against the official ISO 20022 schemas
    # vendored in core/schemas/ (see core/schemas/README.md for provenance).
    name: XSD validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install xmllint
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libxml2-utils
      - name: pacs.008 fixtures
        run: xmllint --noout --schema core/schemas/pacs.008.001.08.xsd core/tests/fixtures/pacs008_valid*.xml
      - name: pacs.002 fixtures
        run: xmllint --noout --schema core/schemas/pacs.002.001.10.xsd core/tests/fixtures/pacs002_valid*.xml
      - name: head.001 fixtures
        run: xmllint --noout --schema core/schemas/head.001.001.02.xsd core/tests/fixtures/head001_valid*.xml
      - name: pacs.028 fixtures
        run: xmllint --noout --schema core/schemas/pacs.028.001.03.xsd core/tests/fixtures/pacs028_valid*.xml
      - name: pacs.004 fixtures
        run: xmllint --noout --schema core/schemas/pacs.004.001.10.xsd core/tests/fixtures/pacs004_valid*.xml
