name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: tests
        run: cargo test --workspace

  python-sdk:
    # Unit tests against a stub, then the SDK's integration suite against a
    # LIVE gateway↔simulator pair in MQ mode — the same stack users run.
    name: python sdk (live stack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install pytest + the SDK (as a user would)
        run: pip install pytest ./sdk/python
      - name: Build the stack
        run: cargo build -p fednow-sim -p fednow-gateway
      - name: Launch sim + gateway (MQ mode, fast reconcile timings)
        run: |
          ./target/debug/fednow-sim &
          FEDNOW_GW_SOUTHBOUND=mq FEDNOW_GW_SWEEP_SECS=1 \
            FEDNOW_GW_TIMEOUT_SECS=3 FEDNOW_GW_BACKOFF_SECS=2 \
            FEDNOW_GW_DB=/tmp/sdk-ci-gateway.db \
            ./target/debug/fednow-gateway &
          timeout 30 bash -c 'until curl -sf localhost:8090/healthz >/dev/null; do sleep 1; done'
      - name: Unit + integration tests
        run: FEDNOW_GW_URL=http://localhost:8090 python -m pytest sdk/python -q

  java-sdk:
    # Same recipe as the Python job: unit tests on a stub, then the
    # integration suite against a LIVE gateway↔simulator pair in MQ mode.
    name: java sdk (live stack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Build the stack
        run: cargo build -p fednow-sim -p fednow-gateway
      - name: Launch sim + gateway (MQ mode, fast reconcile timings)
        run: |
          ./target/debug/fednow-sim &
          FEDNOW_GW_SOUTHBOUND=mq FEDNOW_GW_SWEEP_SECS=1 \
            FEDNOW_GW_TIMEOUT_SECS=3 FEDNOW_GW_BACKOFF_SECS=2 \
            FEDNOW_GW_DB=/tmp/java-sdk-ci-gateway.db \
            ./target/debug/fednow-gateway &
          timeout 30 bash -c 'until curl -sf localhost:8090/healthz >/dev/null; do sleep 1; done'
      - name: Unit + integration tests
        run: FEDNOW_GW_URL=http://localhost:8090 mvn -q -B -f sdk/java/pom.xml test

  xsd-validate:
    # Validates the valid XML fixtures against the official ISO 20022 schemas
    # vendored in core/schemas/ (see core/schemas/README.md for provenance).
    name: XSD validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install xmllint
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libxml2-utils
      - name: pacs.008 fixtures
        run: xmllint --noout --schema core/schemas/pacs.008.001.08.xsd core/tests/fixtures/pacs008_valid*.xml
      - name: pacs.002 fixtures
        run: xmllint --noout --schema core/schemas/pacs.002.001.10.xsd core/tests/fixtures/pacs002_valid*.xml
      - name: head.001 fixtures
        run: xmllint --noout --schema core/schemas/head.001.001.02.xsd core/tests/fixtures/head001_valid*.xml
      - name: pacs.028 fixtures
        run: xmllint --noout --schema core/schemas/pacs.028.001.03.xsd core/tests/fixtures/pacs028_valid*.xml
      - name: pacs.004 fixtures
        run: xmllint --noout --schema core/schemas/pacs.004.001.10.xsd core/tests/fixtures/pacs004_valid*.xml
      - name: camt.056 fixtures
        run: xmllint --noout --schema core/schemas/camt.056.001.08.xsd core/tests/fixtures/camt056_valid*.xml
      - name: camt.029 fixtures
        run: xmllint --noout --schema core/schemas/camt.029.001.09.xsd core/tests/fixtures/camt029_valid*.xml
