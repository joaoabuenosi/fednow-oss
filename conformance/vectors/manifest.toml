# Conformance vector corpus — FedNow Service Release 1 message profiles.
#
# Each vector is an ISO 20022 message and its expected verdict. `valid` is
# universal (any implementation can assert it); `codes` are fednow-core's
# stable rule identifiers for implementations that adopt the same taxonomy.
# pacs.002 vectors carry the FedNow direction they must be judged against.

[[vector]]
file = "pacs008/valid.xml"
valid = true

[[vector]]
file = "pacs008/bad-aba-checksum.xml"
valid = false
codes = ["fednow.aba.checksum"]

[[vector]]
file = "pacs008/non-usd.xml"
valid = false
codes = ["fednow.ccy.usd"]

[[vector]]
file = "pacs008/missing-category-purpose.xml"
valid = false
codes = ["fednow.pmttpinf.ctgypurp"]

[[vector]]
file = "pacs008/non-fednow-msgid.xml"
valid = false
codes = ["fednow.msgid.format"]

[[vector]]
file = "pacs002/service-advice-settled.xml"
direction = "service"
valid = true

[[vector]]
